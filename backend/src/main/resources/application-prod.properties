# ========================
# APPLICATION PROPERTIES (Production Profile)
# ========================
# Activate with: --spring.profiles.active=prod
# or env variable: SPRING_PROFILES_ACTIVE=prod
# NOTE: Override all sensitive values via environment variables in production.

# ── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── DataSource (PostgreSQL) ──────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP Connection Pool ──────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT Configuration ─────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=${UPLOAD_DIR:/app/uploads}

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:https://synergypharma.com}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.synergypharma=INFO
logging.level.org.springframework.security=WARN
