# ========================
# APPLICATION PROPERTIES (Development Profile)
# ========================

spring.application.name=synergy-pharma

# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── DataSource (PostgreSQL) ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/synergypharma
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT Configuration ─────────────────────────────────────────────────────────
# IMPORTANT: Change this secret in production. Must be at least 256-bit (32 chars).
app.jwt.secret=SynergyPharmaSecretKeyForJWTTokenGenerationAndValidation2024
app.jwt.expiration-ms=86400000

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.synergypharma=DEBUG
logging.level.org.springframework.security=DEBUG
